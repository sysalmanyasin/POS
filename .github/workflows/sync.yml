name: Remote Inventory Overwrite

on:
  repository_dispatch:
    types: [update_inventory]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.INVENTORY_SYNC_TOKEN }}

      - name: Write Inventory Data
        run: |
          echo '${{ github.event.client_payload.json_data }}' > data/base-inventory.json

      - name: Commit and Push Changes
        run: |
          git config --global user.name "DuaPharma Hub Bot"
          git config --global user.email "bot@duapharma.com"
          git add data/base-inventory.json
          git commit -m "Automated master catalog refresh via POS Dispatch Node" || exit 0
          git push origin main
